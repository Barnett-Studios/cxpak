name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: rustfmt
      - run: cargo fmt -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2.9.1
      - run: cargo clippy --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2.9.1
      - run: cargo test --verbose

  bench:
    # Recall-regression gate (ADR-0172). Two layers:
    #   * always: the no-network corpus-integrity + metric + baseline tests.
    #   * network gate: runs the harness on the FIXED resource-safe subset
    #     (ripgrep/flask/express PRs) and FAILS the job if cxpak (auto_context)
    #     recall drops below the committed bench/baseline.json. `gh` is
    #     preinstalled on ubuntu-latest and reads GH_TOKEN for an authenticated
    #     (higher-rate-limit) API.
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2.9.1
      - name: No-network bench tests (corpus + metrics + baseline integrity)
        run: cargo test --features bench --test bench_recall --test bench_gate
      - name: Recall-regression gate (network)
        env:
          # secrets.GITHUB_TOKEN is auto-provided on this repo's branch/PR runs;
          # gh reads GH_TOKEN. On forked-PR runs the token is absent/limited, so
          # the gate skips gracefully (it never claims to have run without the
          # env) rather than false-failing. On this repo it runs with teeth.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CXPAK_BENCH_NET: ${{ secrets.GITHUB_TOKEN != '' && '1' || '' }}
        run: |
          if [ -z "${CXPAK_BENCH_NET}" ]; then
            echo "No GH token (likely a forked-PR run) — skipping network recall gate."
            exit 0
          fi
          cargo test --features bench --test bench_gate recall_gate_holds -- --ignored --nocapture

  msrv:
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Verify build on declared MSRV (1.91.0)
        run: cargo build --verbose

  coverage:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@1.94.1
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin --version 0.35.2 --locked
      - name: Check coverage (90% minimum)
        run: |
          OUTPUT=$(cargo tarpaulin --engine llvm --skip-clean --no-default-features --features "daemon,lang-rust,lang-typescript,lang-javascript,lang-java,lang-python,lang-go,lang-c,lang-cpp,lang-ruby,lang-csharp,lang-swift,lang-kotlin,lang-bash,lang-css,lang-scss,lang-php,lang-markdown,lang-json,lang-yaml,lang-toml,lang-dockerfile,lang-hcl,lang-dart,lang-scala,lang-lua,lang-clojure,lang-elixir,lang-zig,lang-haskell,lang-groovy,lang-objc,lang-r,lang-julia,lang-ocaml,lang-matlab,lang-proto,lang-svelte,lang-makefile,lang-html,lang-graphql,lang-xml,lang-sql,lang-prisma" --all-targets --timeout 600 2>&1) || true
          echo "$OUTPUT"
          COVERAGE=$(echo "$OUTPUT" | grep -oP '[\d.]+(?=% coverage)' | tail -1)
          echo "Coverage: ${COVERAGE}%"
          if [ -z "$COVERAGE" ]; then
            echo "❌ Could not determine coverage from tarpaulin output"
            exit 1
          fi
          if [ "$(echo "$COVERAGE < 90" | bc -l)" -eq 1 ]; then
            echo "❌ Coverage ${COVERAGE}% is below 90% threshold"
            exit 1
          fi
          echo "✅ Coverage ${COVERAGE}% meets 90% threshold"
